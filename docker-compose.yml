name: datareach

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: sh -c "pnpm prisma:deploy && pnpm start:docker"
    restart: on-failure:5
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailcatcher:
        condition: service_started

  scraper-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: pnpm start:docker:worker:scraper
    restart: on-failure:5
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  email-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: pnpm start:docker:worker:email
    restart: on-failure:5
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailcatcher:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailcatcher:
    image: stpaquet/alpinemailcatcher
    ports:
      - "1025:1025"
      - "1080:1080"

volumes:
  postgres-data:
